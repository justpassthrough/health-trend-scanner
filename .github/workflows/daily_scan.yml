name: "[v1 비활성화] Daily Health Trend Scan"

on:
  # v2로 전환됨 — 스케줄 비활성화
  # schedule:
  #   - cron: '30 22 * * *'
  #   - cron: '0 4 * * *'
  #   - cron: '0 10 * * *'
  #   - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      skip_youtube:
        description: '유튜브 스킵 (API 한도 절약)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data collection
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          SKIP_YT="${{ github.event.inputs.skip_youtube || 'false' }}"
          if [ "$SKIP_YT" = "true" ]; then
            python scripts/collect.py --skip-youtube
          else
            python scripts/collect.py
          fi

      - name: Build dashboard
        run: python scripts/build_dashboard.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "update: $(TZ=Asia/Seoul date +%Y-%m-%d\ %H:%M) scan results"
          git push
