name: Health Trend Scan v2

on:
  schedule:
    - cron: '0 23 * * *'    # KST 08:00 (UTC 전날 23:00)
    - cron: '0 11 * * *'    # KST 20:00 (UTC 11:00)
  workflow_dispatch:          # 수동 실행

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan v2
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/collect_v2.py

      - name: Build dashboard v2
        run: python scripts/build_dashboard_v2.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "scan v2: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')"
          git push
